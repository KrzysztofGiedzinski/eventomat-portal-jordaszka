<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Portal Klienta · Jordaszka — Eventomat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: #8a9d34; --accent-deep: #6f8128; --accent-soft: #f1f4e3; --accent-border: #d8e0b8;
    --paper: #faf9f5; --card: #ffffff; --ink: #232218; --ink-soft: #6c6a5d;
    --line: #ece9df; --line-strong: #ddd9cb; --info: #3f6f8f; --info-soft: #eaf1f5;
    --shadow: 0 1px 2px rgba(40,38,24,.04), 0 8px 24px rgba(40,38,24,.05);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Geist', system-ui, -apple-system, sans-serif;
    background: var(--paper); color: var(--ink); line-height: 1.5;
    -webkit-font-smoothing: antialiased; padding: 0 20px 96px;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(900px 400px at 100% -5%, rgba(138,157,52,.06), transparent 70%),
      radial-gradient(700px 360px at -10% 8%, rgba(138,157,52,.05), transparent 70%);
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  header { padding: 48px 0 8px; text-align: center; }
  .brand { display: inline-flex; align-items: center; gap: 12px; }
  .brand img { height: 50px; width: auto; }
  .brand .sep { width: 1px; height: 32px; background: var(--line-strong); }
  .brand .app { font-size: 13px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; }
  .tag { display:inline-block; margin-top:16px; font-size:11px; letter-spacing:.12em; text-transform:uppercase;
    color: var(--accent-deep); background: var(--accent-soft); border:1px solid var(--accent-border);
    padding:4px 11px; border-radius:999px; font-weight:600; }
  h1 { font-size: clamp(23px, 5vw, 31px); font-weight: 700; letter-spacing: -.02em; margin: 14px 0 12px; }
  .lede { color: var(--ink-soft); font-size: 16px; max-width: 540px; margin: 0 auto; }
  .lede strong { color: var(--ink); font-weight: 600; }

  .section-head { display: flex; align-items: center; gap: 12px; margin: 40px 0 16px; padding-bottom: 13px; border-bottom: 1px solid var(--line); }
  .section-head .chip { width: 38px; height: 38px; flex: none; border-radius: 11px; display: grid; place-items: center; font-size: 19px; background: var(--accent-soft); border: 1px solid var(--accent-border); }
  .section-head .chip.grzegorz { background: var(--info-soft); border-color: #bcd2de; }
  .section-head h2 { font-size: 17px; font-weight: 600; }
  .section-head p { font-size: 13.5px; color: var(--ink-soft); }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 24px 24px 22px; margin-bottom: 16px;
    animation: rise .5s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .card { animation: none; } }
  /* tła wg typu wpisu */
  .card.k-komunikat { border-left: 3px solid var(--info);   background: #f6fafb; }
  .card.k-postep    { border-left: 3px solid var(--accent);  background: #f8faf1; }
  .card.k-uwaga     { border-left: 3px solid #d99a3a;        background: #fdf8ef; }
  .kicker { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
  .kicker.pytanie   { color: var(--ink-soft); }
  .kicker.komunikat { color: var(--info); }
  .kicker.postep    { color: var(--accent-deep); }
  .kicker.uwaga     { color: #b5731f; }

  .all-done { text-align: center; color: var(--ink-soft); font-size: 15px; padding: 22px 0 8px; }
  /* Historia — załatwione, zwinięte */
  .historia { margin-top: 40px; border-top: 1px solid var(--line); }
  .historia > summary { cursor: pointer; list-style: none; padding: 16px 4px; font-size: 14px; font-weight: 600; color: var(--ink-soft); display: flex; align-items: center; gap: 9px; }
  .historia > summary::-webkit-details-marker { display: none; }
  .historia > summary::before { content: "▸"; transition: transform .15s; color: var(--line-strong); }
  .historia[open] > summary::before { transform: rotate(90deg); }
  .historia .hist-count { background: var(--line); color: var(--ink-soft); border-radius: 999px; padding: 1px 10px; font-size: 12px; font-weight: 600; }
  /* wpis w Historii domknięty do jednej linii; klik rozwija pełną kartę */
  .hist-item { border-top: 1px solid var(--line); }
  .hist-item > summary { cursor: pointer; list-style: none; display: flex; align-items: center; gap: 10px; padding: 12px 4px; font-size: 14px; }
  .hist-item > summary::-webkit-details-marker { display: none; }
  .hist-item .hi-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; background: var(--line-strong); }
  .hist-item.k-komunikat .hi-dot { background: var(--info); }
  .hist-item.k-pytanie   .hi-dot { background: var(--accent); }
  .hist-item.k-postep    .hi-dot { background: var(--accent-deep); }
  .hist-item.k-uwaga     .hi-dot { background: #d99a3a; }
  .hist-item .hi-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
  .hist-item .hi-meta { font-size: 12px; color: var(--ink-soft); flex: none; }
  .hist-item .hi-body .card { border: none; box-shadow: none; background: transparent; padding: 4px 4px 12px; margin: 0; animation: none; opacity: 1; }
  .card .q-title { font-size: 17px; font-weight: 600; letter-spacing: -.01em; }
  .card .q-intro { font-size: 14.5px; color: var(--ink-soft); margin-top: 7px; }
  .rec { margin: 16px 0 4px; padding: 12px 14px; border-radius: 11px; background: var(--accent-soft); border-left: 3px solid var(--accent); font-size: 14px; color: #43491f; }
  .rec b { display: block; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent-deep); margin-bottom: 3px; font-weight: 700; }

  .field { margin-top: 18px; }
  .field > label.flabel { display: block; font-size: 14px; font-weight: 500; margin-bottom: 9px; }
  .opts { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt { position: relative; cursor: pointer; user-select: none; border: 1px solid var(--line-strong); border-radius: 10px;
    padding: 10px 15px; font-size: 14px; background: #fff; transition: border-color .12s, background .12s, color .12s; }
  .opt:hover { border-color: var(--accent); }
  .opt input { position: absolute; opacity: 0; inset: 0; cursor: pointer; }
  .opt.checked { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  textarea, input[type=text] { width: 100%; font-family: inherit; font-size: 14.5px; color: var(--ink);
    border: 1px solid var(--line-strong); border-radius: 10px; padding: 11px 13px; background: #fff; resize: vertical; transition: border-color .12s; }
  textarea { min-height: 72px; }
  textarea:focus, input[type=text]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .uwagi label { display: block; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 7px; }

  .btn { font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 10px; padding: 10px 18px; border: 1px solid var(--ink); background: var(--ink); color: #fff; transition: opacity .12s; }
  .btn:hover { opacity: .9; }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn.ghost { background: #fff; color: var(--ink); border-color: var(--line-strong); }
  .ack-row { margin-top: 16px; display: flex; align-items: center; gap: 12px; }
  .ack-done { font-size: 14px; color: var(--accent-deep); font-weight: 500; }
  .ack-done .when { color: var(--ink-soft); font-weight: 400; font-size: 12.5px; }

  /* skrzynka zwrotna */
  .reply { margin-top: 40px; }
  .reply .section-head { border-color: var(--accent-border); }
  .reply-card { background: var(--accent-soft); border: 1px solid var(--accent-border); border-radius: var(--radius); padding: 22px; }
  .reply-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .reply-card p { font-size: 14px; color: var(--ink-soft); margin-bottom: 14px; }
  .reply-card .row { display: flex; gap: 10px; margin-top: 12px; align-items: flex-end; }
  .sent-list { margin-top: 16px; }
  .sent-item { font-size: 13.5px; background: #fff; border: 1px solid var(--accent-border); border-radius: 10px; padding: 10px 13px; margin-top: 8px; }
  .sent-item .when { display: block; font-size: 11.5px; color: var(--ink-soft); margin-top: 3px; }

  .save-pill { position: fixed; right: 18px; bottom: 18px; z-index: 50; display: flex; align-items: center; gap: 8px;
    background: var(--ink); color: #fff; font-size: 13px; font-weight: 500; padding: 9px 15px; border-radius: 999px;
    box-shadow: 0 6px 20px rgba(0,0,0,.18); opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s; }
  .save-pill.show { opacity: 1; transform: none; }
  .save-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #9ad36a; }
  .save-pill.saving .dot { background: #f0c860; animation: pulse 1s infinite; }
  .save-pill.error { background: #8a2c2c; }
  .save-pill.error .dot { background: #f0a0a0; }
  @keyframes pulse { 50% { opacity: .35; } }

  footer { text-align: center; color: var(--ink-soft); font-size: 13px; margin-top: 44px; }
  .loading { text-align: center; color: var(--ink-soft); padding: 48px 0; font-size: 15px; }
  .toast-error { padding: 14px 16px; border-radius: 12px; background: #fbeaea; border: 1px solid #e6c4c4; color: #8a2c2c; font-size: 14px; margin-top: 16px; }

  /* admin */
  .admin-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start; padding: 14px 0; border-bottom: 1px solid var(--line); }
  .admin-row .k { font-size: 12px; color: var(--ink-soft); }
  .admin-row .a { font-size: 15px; margin-top: 3px; white-space: pre-wrap; }
  .admin-row .a.empty { color: #b9b6a8; font-style: italic; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .badge.done { background: var(--accent-soft); color: var(--accent-deep); border: 1px solid var(--accent-border); }
  .badge.wait { background: #f4f2ea; color: #a8a496; border: 1px solid var(--line); }

  /* ── Telefon ── */
  @media (max-width: 600px) {
    body { padding: 0 13px 86px; }
    header { padding: 30px 0 4px; }
    .brand img { height: 42px; }
    .brand .sep { height: 28px; }
    h1 { font-size: 25px; margin-top: 10px; }
    .lede { font-size: 15px; }
    .section-head { margin: 32px 0 14px; }
    .card { padding: 20px 16px 18px; border-radius: 14px; }
    .card .q-title { font-size: 16.5px; }
    .opts { gap: 7px; }
    .opt { flex: 1 1 100%; text-align: center; padding: 13px 14px; font-size: 15px; }  /* pełna szerokość = łatwy dotyk */
    .ack-row .btn, .reply-card .row { width: 100%; }
    .reply-card .row .btn { width: 100%; }
    .save-pill { right: 13px; bottom: 13px; }
    .admin-row { grid-template-columns: 1fr; }
    .admin-row .badge { justify-self: start; }
  }

  /* ── Desktop ── */
  @media (min-width: 900px) {
    .wrap { max-width: 760px; }
    header { padding: 64px 0 8px; }
    .brand img { height: 54px; }
    .card { padding: 26px 28px 24px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <img src="assets/jordaszka-logo.png" alt="Jordaszka" />
      <span class="sep"></span>
      <span class="app">Eventomat</span>
    </div>
    <span class="tag" id="page-tag">Portal Klienta · podgląd</span>
    <h1 id="page-title">Wasz portal — bądźmy w kontakcie</h1>
    <p class="lede" id="page-lede">
      Tu będę zadawać pytania i wysyłać komunikaty w trakcie budowy.
      <strong>Odpowiedzi zapisują się automatycznie</strong> — możecie wracać kiedy chcecie.
    </p>
  </header>

  <main id="root"><div class="loading">Ładuję portal…</div></main>

  <footer id="page-footer">Portal Klienta (podgląd) · Eventomat dla Jordaszki</footer>
</div>

<div class="save-pill" id="pill"><span class="dot"></span><span id="pill-text">Zapisano</span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Konfiguracja ──────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://svhrrwqbajyflvnspuda.supabase.co';
const SUPABASE_ANON = 'sb_publishable__q1Op2Wc8lk-HEsGUOhCYg_U8jTUNyg';
const RESPONDENT    = 'jordaszka';

// Sekret admina NIE jest zaszyty w stronie — podajesz go w URL: ?view=admin&token=<sekret>.
// Autoryzację robi serwer (RPC waliduje token); strona przekazuje tylko to, co w URL.
const params     = new URLSearchParams(location.search);
const isAdmin    = params.get('view') === 'admin';
const adminToken = params.get('token') || '';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const root = document.getElementById('root');
const pill = document.getElementById('pill');
const pillText = document.getElementById('pill-text');
let pillTimer;
function showPill(state, text) {
  pill.className = 'save-pill show' + (state ? ' ' + state : '');
  pillText.textContent = text;
  clearTimeout(pillTimer);
  if (state !== 'saving') pillTimer = setTimeout(() => pill.classList.remove('show'), 2200);
}

const LS_KEY = 'portal_' + RESPONDENT;
function lsLoad() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; } }
function lsSave(k, v) { const d = lsLoad(); d[k] = v; localStorage.setItem(LS_KEY, JSON.stringify(d)); }
const SENT_KEY = 'portal_sent_' + RESPONDENT;
function sentLoad() { try { return JSON.parse(localStorage.getItem(SENT_KEY)) || []; } catch { return []; } }
function sentPush(o) { const a = sentLoad(); a.unshift(o); localStorage.setItem(SENT_KEY, JSON.stringify(a)); }

// ── Zapis odpowiedzi (debounce) ────────────────────────────────────────────────
const timers = {};
function queueSave(key, value) {
  lsSave(key, value);
  clearTimeout(timers[key]);
  showPill('saving', 'Zapisywanie…');
  timers[key] = setTimeout(() => save(key, value), 550);
}
async function save(key, value) {
  const { error } = await sb.rpc('submit_workshop_answer', { p_token: RESPONDENT, p_key: key, p_answer: value, p_note: null });
  if (error) { showPill('error', 'Błąd zapisu — zachowane lokalnie'); console.error(error); }
  else showPill('', 'Zapisano ✓');
}

const RECIP = { dominika: { icon: '👤', name: 'Dominika', sub: 'Operacje i fakty z codziennej obsługi' },
                grzegorz: { icon: '👤', name: 'Grzegorz', sub: 'Tematy techniczne — system hotelowy i sala' } };

// ── Render: portal klienta ──────────────────────────────────────────────────────
const KIND_LABEL = { pytanie: 'Pytanie', komunikat: 'Komunikat', postep: 'Postęp prac', uwaga: 'Uwaga' };

// „załatwione": pytanie = ma jakąkolwiek odpowiedź; komunikat = potwierdzony
function isDone(msg, answers) {
  if ((msg.fields || []).length) return msg.fields.some(f => { const v = answers[f.key]; return v != null && v !== ''; });
  if (msg.kind === 'komunikat') return answers['ack_' + msg.id] != null;
  return false;
}

function renderCard(msg, answers, delay) {
  const el = document.createElement('section');
  el.className = 'card k-' + msg.kind;
  el.style.animationDelay = delay + 'ms';
  el.innerHTML =
    `<div class="kicker ${msg.kind}">${KIND_LABEL[msg.kind] || 'Wpis'}</div>` +
    `<div class="q-title">${esc(msg.title)}</div>` +
    (msg.body ? `<p class="q-intro">${esc(msg.body)}</p>` : '') +
    (msg.rec ? `<div class="rec"><b>Moja propozycja</b>${esc(msg.rec)}</div>` : '');
  if ((msg.fields || []).length) {
    msg.fields.forEach(f => el.appendChild(renderField(f, answers[f.key])));
  } else if (msg.kind === 'komunikat') {
    el.appendChild(renderAck(msg.id, answers['ack_' + msg.id]));
  }
  return el;
}

function renderPortal(feed, answers) {
  root.innerHTML = '';
  const active = [], history = [];
  feed.forEach(m => (isDone(m, answers) ? history : active).push(m));

  // ── Aktywne — pełne karty, pogrupowane po adresacie ──
  let lastRecip = null, delay = 0;
  active.forEach(msg => {
    if (msg.recipient !== 'oboje' && msg.recipient !== lastRecip) {
      lastRecip = msg.recipient;
      const r = RECIP[msg.recipient];
      if (r) {
        const sh = document.createElement('div'); sh.className = 'section-head';
        sh.innerHTML = `<div class="chip ${msg.recipient}">${r.icon}</div><div><h2>${r.name}</h2><p>${r.sub}</p></div>`;
        root.appendChild(sh);
      }
    } else if (msg.recipient === 'oboje') { lastRecip = null; }
    root.appendChild(renderCard(msg, answers, (delay += 55)));
  });
  if (!active.length) {
    const p = document.createElement('p'); p.className = 'all-done';
    p.textContent = 'Wszystko ogarnięte — dzięki! Nowe pytania pojawią się tutaj.';
    root.appendChild(p);
  }

  root.appendChild(renderReplyBox());

  // ── Historia — załatwione; każdy wpis domknięty do jednej linii (klik = pełna karta) ──
  if (history.length) {
    const det = document.createElement('details'); det.className = 'historia';
    const sum = document.createElement('summary');
    sum.innerHTML = `Historia — załatwione <span class="hist-count">${history.length}</span>`;
    det.appendChild(sum);
    history.forEach(msg => {
      const item = document.createElement('details'); item.className = 'hist-item k-' + msg.kind;
      const s = document.createElement('summary');
      const who = RECIP[msg.recipient] ? RECIP[msg.recipient].name : '';
      s.innerHTML = `<span class="hi-dot"></span><span class="hi-title">${esc(msg.title)}</span><span class="hi-meta">${who} ✓</span>`;
      item.appendChild(s);
      const body = document.createElement('div'); body.className = 'hi-body';
      body.appendChild(renderCard(msg, answers, 0));
      item.appendChild(body);
      det.appendChild(item);
    });
    root.appendChild(det);
  }
}

function renderAck(id, acked) {
  const wrap = document.createElement('div'); wrap.className = 'ack-row';
  if (acked) {
    wrap.innerHTML = `<span class="ack-done">Przeczytane ✓ <span class="when">${fmtWhen(acked)}</span></span>`;
    return wrap;
  }
  const btn = document.createElement('button'); btn.className = 'btn ghost'; btn.textContent = 'Przeczytane ✓';
  btn.addEventListener('click', () => {
    const stamp = new Date().toISOString();
    queueSave('ack_' + id, stamp);
    wrap.innerHTML = `<span class="ack-done">Przeczytane ✓ <span class="when">${fmtWhen(stamp)}</span></span>`;
  });
  wrap.appendChild(btn);
  return wrap;
}

function renderField(f, savedVal) {
  const wrap = document.createElement('div'); wrap.className = 'field';
  if (f.type === 'radio') {
    const lab = document.createElement('label'); lab.className = 'flabel'; lab.textContent = f.label; wrap.appendChild(lab);
    const opts = document.createElement('div'); opts.className = 'opts';
    f.options.forEach(o => {
      const l = document.createElement('label'); l.className = 'opt'; if (savedVal === o) l.classList.add('checked');
      const inp = document.createElement('input'); inp.type = 'radio'; inp.name = f.key; if (savedVal === o) inp.checked = true;
      l.appendChild(inp); l.appendChild(document.createTextNode(o));
      inp.addEventListener('change', () => { opts.querySelectorAll('.opt').forEach(x => x.classList.remove('checked')); l.classList.add('checked'); queueSave(f.key, o); });
      opts.appendChild(l);
    });
    wrap.appendChild(opts);
  } else {
    wrap.classList.add('uwagi');
    const lab = document.createElement('label'); lab.textContent = f.label; wrap.appendChild(lab);
    const ta = document.createElement('textarea'); ta.placeholder = f.placeholder || ''; if (savedVal) ta.value = savedVal;
    ta.addEventListener('input', () => queueSave(f.key, ta.value));
    wrap.appendChild(ta);
  }
  return wrap;
}

function renderReplyBox() {
  const sec = document.createElement('div'); sec.className = 'reply';
  sec.innerHTML = `<div class="section-head"><div class="chip">✉️</div><div><h2>Napiszcie do mnie</h2><p>Pytanie, uwaga, cokolwiek — odezwę się.</p></div></div>`;
  const card = document.createElement('div'); card.className = 'reply-card';
  card.innerHTML = `<h3>Wiadomość do mnie</h3><p>Macie pytanie albo coś do dodania? Piszcie śmiało.</p>`;
  const ta = document.createElement('textarea'); ta.placeholder = 'Napiszcie tutaj…';
  const row = document.createElement('div'); row.className = 'row';
  const btn = document.createElement('button'); btn.className = 'btn'; btn.textContent = 'Wyślij';
  row.appendChild(btn);
  const sentBox = document.createElement('div'); sentBox.className = 'sent-list';
  function renderSent() {
    const a = sentLoad();
    sentBox.innerHTML = a.length ? '<div class="k" style="font-size:12px;color:var(--ink-soft);margin-top:6px">Wysłane przez Was:</div>' : '';
    a.forEach(s => { const d = document.createElement('div'); d.className = 'sent-item'; d.innerHTML = `${esc(s.body)}<span class="when">${fmtWhen(s.at)}</span>`; sentBox.appendChild(d); });
  }
  btn.addEventListener('click', async () => {
    const body = ta.value.trim(); if (!body) return;
    btn.disabled = true; btn.textContent = 'Wysyłam…';
    const { error } = await sb.rpc('send_portal_message', { p_token: RESPONDENT, p_body: body });
    if (error) { showPill('error', 'Nie udało się wysłać'); btn.disabled = false; btn.textContent = 'Wyślij'; console.error(error); return; }
    sentPush({ body, at: new Date().toISOString() }); ta.value = ''; renderSent();
    showPill('', 'Wysłano ✓'); btn.disabled = false; btn.textContent = 'Wyślij';
  });
  card.appendChild(ta); card.appendChild(row); card.appendChild(sentBox);
  sec.appendChild(card);
  setTimeout(renderSent, 0);
  return sec;
}

// ── Render: widok administratora ────────────────────────────────────────────────
async function renderAdmin() {
  document.getElementById('page-tag').textContent = 'Widok administratora';
  document.getElementById('page-title').textContent = 'Tablica portalu — Jordaszka';
  document.getElementById('page-lede').innerHTML = 'Podgląd na żywo: odpowiedzi, potwierdzenia i wiadomości od Jordanów.';
  document.getElementById('page-footer').textContent = 'Widok administratora';

  const [feedR, ansR, inbR] = await Promise.all([
    sb.rpc('get_portal_feed', { p_token: adminToken }),
    sb.rpc('get_workshop_answers', { p_token: adminToken }),
    sb.rpc('get_portal_inbound', { p_token: adminToken }),
  ]);
  if (feedR.error || ansR.error) { root.innerHTML = `<div class="toast-error">Błąd odczytu: ${esc((feedR.error||ansR.error).message)}</div>`; return; }
  const ans = {}; (ansR.data || []).forEach(r => ans[r.question_key] = r);
  root.innerHTML = '';

  // wiadomości od klienta
  const inbox = document.createElement('section'); inbox.className = 'card';
  inbox.innerHTML = `<div class="kicker k">Skrzynka</div><div class="q-title">Wiadomości od Jordanów</div>`;
  const inb = inbR.error ? [] : (inbR.data || []);
  if (!inb.length) inbox.innerHTML += `<p class="q-intro">— brak wiadomości —</p>`;
  inb.forEach(m => { const d = document.createElement('div'); d.className='admin-row'; d.innerHTML = `<div><div class="a">${esc(m.body)}</div><div class="k" style="margin-top:4px">${fmtWhen(m.created_at)}</div></div>`; inbox.appendChild(d); });
  root.appendChild(inbox);

  // odpowiedzi per wpis
  (feedR.data || []).forEach(msg => {
    const box = document.createElement('section'); box.className = 'card';
    box.innerHTML = `<div class="kicker ${msg.kind==='komunikat'?'k':'q'}">${msg.kind==='komunikat'?'Komunikat':'Pytanie'} · ${RECIP[msg.recipient]?RECIP[msg.recipient].name:'Oboje'}</div><div class="q-title">${esc(msg.title)}</div>`;
    if (msg.kind === 'komunikat') {
      const a = ans['ack_' + msg.id];
      const row = document.createElement('div'); row.className = 'admin-row';
      row.innerHTML = `<div class="${a?'a':'a empty'}">${a?'Przeczytane ✓ '+fmtWhen(a.answer):'— nie potwierdzono —'}</div><span class="badge ${a?'done':'wait'}">${a?'ok':'czeka'}</span>`;
      box.appendChild(row);
    } else {
      (msg.fields || []).forEach(f => {
        const a = ans[f.key]; const row = document.createElement('div'); row.className = 'admin-row';
        const val = a ? esc(String(a.answer)) : '— czeka —';
        row.innerHTML = `<div><div class="k">${esc(f.label)}</div><div class="a ${a?'':'empty'}">${val}</div>${a?`<div class="k" style="margin-top:4px">${fmtWhen(a.updated_at)}</div>`:''}</div><span class="badge ${a?'done':'wait'}">${a?'odpowiedziano':'czeka'}</span>`;
        box.appendChild(row);
      });
    }
    root.appendChild(box);
  });
}

// ── Narzędzia ────────────────────────────────────────────────────────────────
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtWhen(iso) { try { return new Date(iso).toLocaleString('pl-PL', { dateStyle:'short', timeStyle:'short' }); } catch { return ''; } }

// ── Start ──────────────────────────────────────────────────────────────────────
async function startClient() {
  const feedR = await sb.rpc('get_portal_feed', { p_token: RESPONDENT });
  if (feedR.error) { root.innerHTML = `<div class="toast-error">Nie udało się wczytać portalu: ${esc(feedR.error.message)}</div>`; return; }
  const ansR = await sb.rpc('get_workshop_answers', { p_token: RESPONDENT });
  const answers = lsLoad();
  if (!ansR.error) (ansR.data || []).forEach(r => answers[r.question_key] = r.answer);
  Object.entries(answers).forEach(([k, v]) => lsSave(k, v));
  renderPortal(feedR.data || [], answers);
}

if (isAdmin) renderAdmin(); else startClient();
</script>
